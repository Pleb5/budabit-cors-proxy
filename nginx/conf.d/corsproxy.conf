server {
    listen 443 ssl;
    server_name corsproxy.budabit.club;

    # Git push payloads can be large (packfiles), so avoid 413 from nginx.
    client_max_body_size 0;

    ssl_certificate /etc/letsencrypt/live/corsproxy.budabit.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/corsproxy.budabit.club/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        # Stream large git HTTP requests/responses directly to upstream.
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;

        # Long-running push/fetch operations should not time out early.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;

        proxy_pass http://corsproxy:8080;
    }
}

server {
    listen 80;
    server_name corsproxy.budabit.club;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
